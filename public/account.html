<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Account · Messages from the Magi</title>
  <link rel="stylesheet" href="/src/styles/main.css">
</head>
<body class="js-loading">

  <div id="site-header-mount"></div>

  <main>
    <section class="section" aria-label="Your account">
      <div class="container container--narrow">

        <!-- Profile -->
        <div style="display:flex;align-items:center;gap:1.5rem;margin-bottom:3rem;padding-bottom:2rem;border-bottom:1px solid var(--color-mist);">
          <div id="account-avatar"
            style="width:64px;height:64px;border-radius:50%;background:var(--color-gold-glow);
              border:1px solid var(--color-gold-muted);display:flex;align-items:center;
              justify-content:center;font-family:var(--font-heading);font-size:1.6rem;
              color:var(--color-gold);flex-shrink:0;">
          </div>
          <div>
            <div class="hero__eyebrow" style="margin-bottom:0.25rem;">Welcome back</div>
            <h1 id="account-name" style="font-size:1.8rem;margin:0 0 0.2rem;"></h1>
            <div id="account-email" style="color:var(--color-dawn);font-size:0.9rem;"></div>
            <div id="account-birthday" style="color:var(--color-mist);font-size:0.82rem;margin-top:0.15rem;"></div>
          </div>
          <button class="btn btn--ghost" id="sign-out-btn"
            style="margin-left:auto;font-size:0.8rem;padding:0.4rem 1rem;flex-shrink:0;">
            Sign Out
          </button>
        </div>

        <!-- Saved Readings (placeholder) -->
        <div style="margin-bottom:3rem;">
          <h2 style="font-size:1rem;font-family:var(--font-heading);letter-spacing:0.1em;
            text-transform:uppercase;color:var(--color-gold-muted);margin-bottom:1.5rem;">
            Saved Readings
          </h2>
          <div id="saved-readings-list"></div>
        </div>

        <!-- Membership -->
        <div>
          <h2 style="font-size:1rem;font-family:var(--font-heading);letter-spacing:0.1em;
            text-transform:uppercase;color:var(--color-gold-muted);margin-bottom:1.5rem;">
            Membership
          </h2>
          <div style="display:flex;align-items:center;gap:1.25rem;padding:1.25rem 1.5rem;
            background:var(--color-dusk);border:1px solid var(--color-mist);border-radius:var(--radius-lg);">
            <div style="font-size:1.8rem;">🌌</div>
            <div>
              <div style="font-family:var(--font-heading);font-size:0.8rem;letter-spacing:0.08em;
                text-transform:uppercase;color:var(--color-gold);margin-bottom:0.2rem;">Initiate</div>
              <div style="font-size:0.85rem;color:var(--color-dawn);">Free tier — full access to readings and oracle.</div>
            </div>
            <a href="/join.html" class="btn btn--ghost"
              style="margin-left:auto;font-size:0.8rem;padding:0.4rem 1rem;flex-shrink:0;">
              Upgrade ✦
            </a>
          </div>
        </div>

      </div>
    </section>
  </main>

  <div id="site-footer-mount"></div>

  <script type="module">
    import { requireAuth }                    from '/src/auth/requireAuth.js';
    import { getUser, clearUser }             from '/src/auth/AuthStore.js';
    import { getSavedReadings, deleteReading } from '/src/auth/SavedReadings.js';
    import { initHeader }                     from '/src/components/Header/Header.js';
    import { initFooter }                     from '/src/components/Footer/Footer.js';

    // Guard: redirect to home if not logged in (body stays invisible during redirect)
    requireAuth('/');

    initHeader('#site-header-mount', { activePath: '/account.html' });
    initFooter('#site-footer-mount');

    const user    = getUser();
    const initial = user.name?.[0]?.toUpperCase() ?? '✦';
    const avatarEl = document.getElementById('account-avatar');

    if (user.avatar) {
      avatarEl.innerHTML = `<img src="${user.avatar}" alt="${user.name}"
        style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;
    } else {
      avatarEl.textContent = initial;
    }

    document.getElementById('account-name').textContent  = user.name  ?? 'Seeker';
    document.getElementById('account-email').textContent = user.email ?? '';

    if (user.birthday) {
      const [y, m, d] = user.birthday.split('-').map(Number);
      const formatted = new Date(y, m - 1, d).toLocaleDateString('en-US', {
        month: 'long', day: 'numeric', year: 'numeric',
      });
      const bdayEl = document.getElementById('account-birthday');
      if (bdayEl) bdayEl.textContent = formatted;
    }

    document.getElementById('sign-out-btn').addEventListener('click', () => {
      clearUser();
      window.location.href = '/';
    });

    // ── Saved readings ────────────────────────────────────────────────────────
    const SUIT_COLORS = {
      Hearts: 'var(--suit-hearts)', Clubs: 'var(--suit-clubs)',
      Diamonds: 'var(--suit-diamonds)', Spades: 'var(--suit-spades)',
      Joker: 'var(--suit-joker)',
    };

    function renderSavedReadings() {
      const list = document.getElementById('saved-readings-list');
      const readings = getSavedReadings();

      if (readings.length === 0) {
        list.innerHTML = `
          <div style="padding:2.5rem;text-align:center;background:var(--color-dusk);
            border:1px dashed var(--color-mist);border-radius:var(--radius-lg);">
            <div style="font-size:2rem;margin-bottom:0.75rem;opacity:0.35;">♦</div>
            <p style="color:var(--color-mist);font-size:0.9rem;margin:0;">
              No saved readings yet.<br>
              <span style="font-size:0.82rem;">Complete a reading and hit <strong>♦ Save Reading</strong>.</span>
            </p>
          </div>`;
        return;
      }

      list.innerHTML = readings.map(r => {
        const date = new Date(r.savedAt).toLocaleDateString('en-US', {
          month: 'short', day: 'numeric', year: 'numeric',
        });
        const suitColor = SUIT_COLORS[r.cardSuit] ?? 'var(--color-gold)';
        return `
          <div data-reading-id="${r.id}"
            style="display:flex;align-items:center;gap:1rem;padding:1rem 1.25rem;
              background:var(--color-dusk);border:1px solid var(--color-mist);
              border-radius:var(--radius-md);margin-bottom:0.75rem;">
            <div style="font-size:1.4rem;color:${suitColor};flex-shrink:0;width:1.8rem;text-align:center;">
              ${r.cardSuitSymbol}
            </div>
            <div style="flex:1;min-width:0;">
              <div style="font-family:var(--font-heading);font-size:0.88rem;color:var(--color-light);
                white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${r.cardName}</div>
              <div style="font-size:0.78rem;color:var(--color-dawn);margin-top:0.15rem;">
                ${r.label} · ${r.eyebrow}
              </div>
            </div>
            <div style="font-size:0.75rem;color:var(--color-mist);flex-shrink:0;text-align:right;">
              ${date}
            </div>
            <button data-delete="${r.id}"
              style="background:none;border:none;color:var(--color-mist);cursor:pointer;
                font-size:1rem;padding:0.25rem 0.4rem;border-radius:var(--radius-sm);
                transition:color 0.15s,background 0.15s;flex-shrink:0;"
              aria-label="Delete reading"
              onmouseover="this.style.color='var(--color-error)';this.style.background='rgba(224,92,92,0.1)'"
              onmouseout="this.style.color='var(--color-mist)';this.style.background='none'">
              ✕
            </button>
          </div>`;
      }).join('');

      list.querySelectorAll('[data-delete]').forEach(btn => {
        btn.addEventListener('click', () => {
          deleteReading(btn.dataset.delete);
          renderSavedReadings();
        });
      });
    }

    renderSavedReadings();

    document.body.classList.replace('js-loading', 'js-ready');
  </script>

</body>
</html>
