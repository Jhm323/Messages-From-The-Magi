<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Account · Messages from the Magi</title>
  <link rel="stylesheet" href="/src/styles/main.css">
</head>
<body class="js-loading">

  <div id="site-header-mount"></div>

  <main>
    <section class="section" aria-label="Your account">
      <div class="container container--narrow">

        <!-- Profile -->
        <div class="account-profile">
          <div id="account-avatar" class="account-avatar"></div>
          <div class="account-profile__info">
            <div class="hero__eyebrow anim-hero" style="--hi:0">Welcome back</div>
            <h1 id="account-name" class="account-name anim-hero" style="--hi:1"></h1>
            <div id="account-email" class="account-email"></div>
            <div id="account-birthday" class="account-birthday"></div>
          </div>
          <div class="account-profile__actions">
            <button class="btn btn--ghost account-sign-out" id="sign-out-btn">Sign Out</button>
            <button class="btn btn--ghost account-sign-out" id="edit-profile-btn">Edit Profile</button>
          </div>
        </div>

        <!-- Saved Readings -->
        <div class="anim-reveal" style="--ri:0;margin-bottom:3rem;">
          <h2 class="section-label">Saved Readings</h2>
          <div id="saved-readings-list"></div>
        </div>

        <!-- Membership -->
        <div class="anim-reveal" style="--ri:1">
          <h2 class="section-label">Membership</h2>
          <div class="account-membership">
            <div class="account-membership__icon">🌌</div>
            <div class="account-membership__body">
              <div class="account-membership__tier">Initiate</div>
              <div class="account-membership__desc">Free tier — full access to readings and oracle.</div>
            </div>
            <div class="account-membership__actions">
              <a href="/join.html" class="btn btn--ghost account-sign-out">Upgrade ✦</a>
            </div>
          </div>
        </div>

      </div>
    </section>
  </main>

  <div class="modal-overlay" id="modal-edit-profile" role="dialog" aria-modal="true" aria-labelledby="modal-edit-profile-title">
    <div class="modal">
      <div class="modal__header">
        <h2 class="modal__title" id="modal-edit-profile-title">Edit Profile</h2>
        <button class="modal__close" id="edit-profile-close" aria-label="Close">✕</button>
      </div>

      <div class="form-group">
        <label class="form-label" for="edit-profile-name">Name</label>
        <input class="form-input" id="edit-profile-name" type="text" placeholder="Your name" autocomplete="given-name">
      </div>

      <div class="form-group">
        <label class="form-label" for="edit-profile-birthday">Birthday</label>
        <input class="form-input" id="edit-profile-birthday" type="date">
        <span class="form-hint">Used to calculate your birth card</span>
      </div>

      <div class="form-group">
        <label class="form-label" for="edit-profile-avatar">Avatar URL</label>
        <input class="form-input" id="edit-profile-avatar" type="url" placeholder="https://…" autocomplete="off">
        <span class="form-hint">Paste a link to an image</span>
      </div>

      <div id="edit-profile-error" role="alert" class="modal__error"></div>

      <div class="modal__actions">
        <button class="btn btn--primary" id="edit-profile-save">Save Changes</button>
        <button class="btn btn--ghost" id="edit-profile-cancel">Cancel</button>
      </div>
    </div>
  </div>

  <div id="site-footer-mount"></div>

  <script type="module" src="/src/pages/Account/account.js"></script>

</body>
</html>
