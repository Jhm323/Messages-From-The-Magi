<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Videos & Content · Messages from the Magi</title>
  <link rel="stylesheet" href="/src/styles/main.css">
</head>
<body class="js-loading videos-page">

  <div id="site-header-mount"></div>

  <main>
    <section class="videos-hero section" aria-label="Videos and Content">
      <div class="container">

        <div class="section-intro">
          <div class="videos-hero__eyebrow hero__eyebrow anim-hero" style="--hi:0">Learn the Science</div>
          <h1 class="videos-hero__title section-intro__title magic-h anim-hero" style="--hi:1">Videos & Content</h1>
          <p class="videos-hero__body section-intro__body anim-para" style="--pi:0">
            Teachings, readings, and explorations of the ancient science of the cards —
            from Sharon Jeffers and the Magi community.
          </p>
        </div>

        <div class="videos-filters chip-group anim-reveal" style="--ri:0" id="video-filter-chips">
          <button class="chip is-active" data-value="all">All</button>
          <button class="chip" data-value="foundations">Foundations</button>
          <button class="chip" data-value="birth-cards">Birth Cards</button>
          <button class="chip" data-value="relationships">Relationships</button>
          <button class="chip" data-value="timing">Timing</button>
        </div>

        <div class="videos-grid grid grid--2 video-grid" id="video-grid-mount"></div>

        <hr class="divider anim-reveal" style="--ri:6">

        <section class="substack-strip anim-reveal" style="--ri:7" aria-label="From the Archive" id="substack-strip">
          <div class="substack-strip__header">
            <div class="section-label">From the Archive</div>
            <a class="substack-strip__link" href="https://starofthemagi.substack.com/" target="_blank" rel="noopener noreferrer">
              View all on Substack ↗
            </a>
          </div>
          <div class="substack-strip__grid" id="substack-posts">
            <!-- Populated by videos.js -->
          </div>
        </section>


      </div>
    </section>
  </main>

  <div id="site-footer-mount"></div>

  <script type="module" src="/src/pages/Videos/videos.js"></script>

</body>
</html>
