<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Cards · Messages from the Magi</title>
  <link rel="stylesheet" href="/src/styles/main.css">
</head>
<body>

  <header class="site-header">
    <div class="site-header__inner">
      <a href="/index.html" class="site-logo" style="text-decoration:none;">
        Messages from the Magi
      </a>
      <nav class="site-nav">
        <a href="/index.html"       class="nav-link">← Home</a>
        <a href="/cards.html"       class="nav-link nav-link--active">The Cards</a>
        <a href="/index.html#join"  class="nav-link">Join the Order</a>
        <a href="/index.html#about" class="nav-link btn btn--secondary" style="margin-left:0.5rem;">Book a Reading</a>
      </nav>
    </div>
  </header>

  <main>
    <section style="padding:4rem 0 2rem;">
      <div class="container">
        <div class="text-center" style="margin-bottom:3rem;">
          <div class="hero__eyebrow">The Living Deck</div>
          <h1 style="font-size:clamp(1.8rem,4vw,2.8rem);margin-bottom:0.75rem;">The 53 Cards</h1>
          <p style="color:var(--color-dawn);max-width:520px;margin:0 auto;">
            Browse the complete deck. Click any card to explore its
            energy, affirmation, and guidance.
          </p>
        </div>

        <div id="card-browser-mount"></div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="site-footer__logo">Messages from the Magi</div>
    <div class="site-footer__copy">
      © <span id="footer-year"></span> Messages from the Magi. All rights reserved.
    </div>
  </footer>

  <script type="module">
    import { initCardBrowser } from '/src/components/CardBrowser.js';
    initCardBrowser('#card-browser-mount');
    document.getElementById('footer-year').textContent = new Date().getFullYear();
  </script>

</body>
</html>
