<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Cards · Messages from the Magi</title>
  <link rel="stylesheet" href="/src/styles/main.css">
</head>
<body>

  <div id="site-header-mount"></div>

  <main>
    <section style="padding:4rem 0 2rem;">
      <div class="container">
        <div class="text-center" style="margin-bottom:3rem;">
          <div class="hero__eyebrow">The Living Deck</div>
          <h1 style="font-size:clamp(1.8rem,4vw,2.8rem);margin-bottom:0.75rem;">The 53 Cards</h1>
          <p style="color:var(--color-dawn);max-width:520px;margin:0 auto;">
            Browse the complete deck. Click any card to explore its
            energy, affirmation, and guidance.
          </p>
        </div>

        <div id="card-browser-mount"></div>
      </div>
    </section>
  </main>

  <div id="site-footer-mount"></div>

  <script type="module">
    import { initHeader }      from '/src/components/Header/Header.js';
    import { initFooter }      from '/src/components/Footer/Footer.js';
    import { initCardBrowser } from '/src/components/CardBrowser.js';

    initHeader('#site-header-mount', { page: 'cards' });
    initFooter('#site-footer-mount');
    initCardBrowser('#card-browser-mount');
  </script>

</body>
</html>
