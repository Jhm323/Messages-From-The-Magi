<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Magi Shop · Messages from the Magi</title>
  <style>
    .shop-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.5rem;
      margin-top: 3rem;
    }

    .product-card {
      background: var(--color-dusk);
      border: 1px solid var(--color-mist);
      border-radius: var(--radius-lg);
      padding: 1.75rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      transition: border-color var(--transition-base), transform var(--transition-base), box-shadow var(--transition-base);
      position: relative;
      overflow: hidden;
    }

    .product-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 80% 60% at 50% -20%, rgba(201, 168, 76, 0.07) 0%, transparent 70%);
      pointer-events: none;
    }

    .product-card:hover {
      border-color: var(--color-gold-muted);
      transform: translateY(-4px);
      box-shadow: var(--shadow-card);
    }

    .product-card--featured {
      border-color: var(--color-gold-muted);
      background: linear-gradient(135deg, var(--color-dusk) 0%, #1e1c38 100%);
      box-shadow: 0 0 0 1px var(--color-gold-glow), var(--shadow-card);
    }

    .product-badge {
      position: absolute;
      top: 1rem;
      right: 1rem;
      padding: 0.2rem 0.6rem;
      border-radius: var(--radius-sm);
      background: var(--color-gold);
      color: var(--color-void);
      font-family: var(--font-heading);
      font-size: 0.62rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-weight: 700;
    }

    .product-icon {
      font-size: 2.5rem;
      line-height: 1;
    }

    .product-type {
      font-family: var(--font-heading);
      font-size: 0.7rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--color-gold-muted);
    }

    .product-name {
      font-family: var(--font-heading);
      font-size: 1rem;
      letter-spacing: 0.04em;
      color: var(--color-white);
      line-height: 1.3;
    }

    .product-desc {
      font-size: 0.88rem;
      color: var(--color-dawn);
      line-height: 1.65;
      flex: 1;
      margin: 0;
    }

    .product-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 0.75rem;
      border-top: 1px solid var(--color-mist);
      margin-top: auto;
    }

    .product-price {
      font-family: var(--font-heading);
      font-size: 1.2rem;
      color: var(--color-gold);
      letter-spacing: 0.04em;
    }

    .product-price__sub {
      font-size: 0.7rem;
      color: var(--color-mist);
      font-family: var(--font-heading);
      letter-spacing: 0.06em;
      margin-left: 0.3rem;
    }

    .add-to-cart-btn {
      padding: 0.5rem 1.1rem;
      border-radius: var(--radius-sm);
      border: 1px solid var(--color-gold-muted);
      background: var(--color-gold-glow);
      color: var(--color-gold);
      font-family: var(--font-heading);
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background var(--transition-fast), border-color var(--transition-fast), color var(--transition-fast);
      white-space: nowrap;
    }

    .add-to-cart-btn:hover {
      background: var(--color-gold);
      color: var(--color-void);
      border-color: var(--color-gold);
    }

    .add-to-cart-btn.is-added {
      background: var(--color-success);
      border-color: var(--color-success);
      color: var(--color-void);
    }
  </style>
  <script type="module" crossorigin src="/assets/shop-D33Hvsld.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/Footer-CbsBbr6j.js">
  <link rel="stylesheet" crossorigin href="/assets/Footer-Dzi5XPCF.css">
</head>
<body class="js-loading">

  <div id="site-header-mount"></div>

  <main>
    <section class="hero">
      <div class="hero__eyebrow">Sacred Commerce</div>
      <h1 class="hero__title">The Magi Shop</h1>
      <p class="hero__body">
        Deepen your practice with guides, readings, and tools rooted in the ancient science of the cards.
      </p>
    </section>

    <section class="section" style="padding-top: 0;">
      <div class="container">
        <div class="shop-grid" id="shop-grid"></div>
      </div>
    </section>
  </main>

  <div id="site-footer-mount"></div>


</body>
</html>
