<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Readings · Messages from the Magi</title>
  <script type="module" crossorigin src="/assets/readings-F-kkhVtF.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/PageAnimations-SjEbwQho.js">
  <link rel="modulepreload" crossorigin href="/assets/CardResult-Dyqsb-xX.js">
  <link rel="modulepreload" crossorigin href="/assets/GeolocationModal-Mojw7EHw.js">
  <link rel="stylesheet" crossorigin href="/assets/PageAnimations-BJsxDwQH.css">
  <link rel="stylesheet" crossorigin href="/assets/CardResult-DJKRWqbL.css">
  <link rel="stylesheet" crossorigin href="/assets/GeolocationModal-C0soZY9k.css">
  <link rel="stylesheet" crossorigin href="/assets/readings-BdeTdVf0.css">
</head>
<body class="js-loading readings-page">

  <div id="site-header-mount"></div>

  <main>
    <section class="readings-hero section" aria-label="Readings">
      <div class="container">

        <div class="readings-hero__intro section-intro">
          <div class="readings-hero__eyebrow hero__eyebrow anim-hero" style="--hi:0">The Oracle Awaits</div>
          <h1 class="readings-hero__title section-intro__title magic-h anim-hero" style="--hi:1">Readings</h1>
          <p class="readings-hero__body section-intro__body anim-para" style="--pi:0">
            Each reading opens a doorway into the ancient science of the cards.
            Choose where your journey begins.
          </p>
        </div>

        <div class="readings-grid">

          <button class="reading-card anim-reveal" style="--ri:0; --suit-color: var(--suit-clubs)" data-feature="birth-card">
            <span class="reading-card__pip reading-card__pip--tl">♣</span>
            <div class="reading-card__body">
              <div class="reading-card__icon">♣</div>
              <div class="reading-card__title">Birth Card Reading</div>
              <p class="reading-card__desc">
                Your birth card is the energetic signature you came in with.
                The card that reflects your soul's nature and life path.
              </p>
            </div>
            <span class="reading-card__pip reading-card__pip--br">♣</span>
          </button>

          <button class="reading-card anim-reveal" style="--ri:1; --suit-color: var(--suit-hearts)" data-feature="compatibility">
            <span class="reading-card__pip reading-card__pip--tl">♥</span>
            <div class="reading-card__body">
              <div class="reading-card__icon"><span style="color: var(--suit-hearts)">♥</span><span style="color: var(--suit-spades)">♠</span></div>
              <div class="reading-card__title">Compatibility Reading</div>
              <p class="reading-card__desc">
                Discover the card that governs your connection with another person.
                Enter two birthdates and reveal the energy between you.
              </p>
            </div>
            <span class="reading-card__pip reading-card__pip--br">♥</span>
          </button>

          <button class="reading-card anim-reveal" style="--ri:2; --suit-color: var(--suit-diamonds)" data-feature="geolocation">
            <span class="reading-card__pip reading-card__pip--tl">♦</span>
            <div class="reading-card__body">
              <div class="reading-card__icon">♦</div>
              <div class="reading-card__title">Location Reading</div>
              <p class="reading-card__desc">
                Every place carries an energetic signature. Discover how a city,
                country, or sacred site interacts with your personal cards.
              </p>
            </div>
            <span class="reading-card__pip reading-card__pip--br">♦</span>
          </button>

          <button class="reading-card anim-reveal" style="--ri:3; --suit-color: var(--suit-spades)" data-feature="greeting-card">
            <span class="reading-card__pip reading-card__pip--tl">♠</span>
            <div class="reading-card__body">
              <div class="reading-card__icon">♠</div>
              <div class="reading-card__title">Greeting Card</div>
              <p class="reading-card__desc">
                Generate a personalized, mystical greeting card drawn from
                the recipient's birth card energy. Printable and shareable.
              </p>
            </div>
            <span class="reading-card__pip reading-card__pip--br">♠</span>
          </button>

        </div>
      </div>
    </section>
  </main>

  <div id="site-footer-mount"></div>


</body>
</html>
