<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Account · Messages from the Magi</title>
  <script type="module" crossorigin src="/assets/account-DssIPqP0.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/Footer-CbsBbr6j.js">
  <link rel="modulepreload" crossorigin href="/assets/SavedReadings-1dH3-Zbr.js">
  <link rel="stylesheet" crossorigin href="/assets/Footer-Dzi5XPCF.css">
</head>
<body class="js-loading">

  <div id="site-header-mount"></div>

  <main>
    <section class="section" aria-label="Your account">
      <div class="container container--narrow">

        <!-- Profile -->
        <div style="display:flex;align-items:center;gap:1.5rem;margin-bottom:3rem;padding-bottom:2rem;border-bottom:1px solid var(--color-mist);">
          <div id="account-avatar"
            style="width:64px;height:64px;border-radius:50%;background:var(--color-gold-glow);
              border:1px solid var(--color-gold-muted);display:flex;align-items:center;
              justify-content:center;font-family:var(--font-heading);font-size:1.6rem;
              color:var(--color-gold);flex-shrink:0;">
          </div>
          <div>
            <div class="hero__eyebrow" style="margin-bottom:0.25rem;">Welcome back</div>
            <h1 id="account-name" style="font-size:1.8rem;margin:0 0 0.2rem;"></h1>
            <div id="account-email" style="color:var(--color-dawn);font-size:0.9rem;"></div>
            <div id="account-birthday" style="color:var(--color-mist);font-size:0.82rem;margin-top:0.15rem;"></div>
          </div>
          <button class="btn btn--ghost" id="sign-out-btn"
            style="margin-left:auto;font-size:0.8rem;padding:0.4rem 1rem;flex-shrink:0;">
            Sign Out
          </button>
        </div>

        <!-- Saved Readings (placeholder) -->
        <div style="margin-bottom:3rem;">
          <h2 style="font-size:1rem;font-family:var(--font-heading);letter-spacing:0.1em;
            text-transform:uppercase;color:var(--color-gold-muted);margin-bottom:1.5rem;">
            Saved Readings
          </h2>
          <div id="saved-readings-list"></div>
        </div>

        <!-- Membership -->
        <div>
          <h2 style="font-size:1rem;font-family:var(--font-heading);letter-spacing:0.1em;
            text-transform:uppercase;color:var(--color-gold-muted);margin-bottom:1.5rem;">
            Membership
          </h2>
          <div style="display:flex;align-items:center;gap:1.25rem;padding:1.25rem 1.5rem;
            background:var(--color-dusk);border:1px solid var(--color-mist);border-radius:var(--radius-lg);">
            <div style="font-size:1.8rem;">🌌</div>
            <div>
              <div style="font-family:var(--font-heading);font-size:0.8rem;letter-spacing:0.08em;
                text-transform:uppercase;color:var(--color-gold);margin-bottom:0.2rem;">Initiate</div>
              <div style="font-size:0.85rem;color:var(--color-dawn);">Free tier — full access to readings and oracle.</div>
            </div>
            <a href="/join.html" class="btn btn--ghost"
              style="margin-left:auto;font-size:0.8rem;padding:0.4rem 1rem;flex-shrink:0;">
              Upgrade ✦
            </a>
          </div>
        </div>

      </div>
    </section>
  </main>

  <div id="site-footer-mount"></div>

</html>
